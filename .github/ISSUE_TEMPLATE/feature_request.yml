name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe your idea in detail.

  - type: textarea
    id: problem
    attributes:
      label: Problem to Solve
      description: What problem or limitation did you encounter?
      placeholder: Currently it's not possible to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
      placeholder: I would like to be able to...
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Usage Example
      description: Show how this feature would be used
      placeholder: |
        ```typescript
        const layer = makeLayer({
          host: "localhost",
          newOption: "value"
        })
        ```
      render: typescript

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there other ways to achieve this currently?
      placeholder: Currently I use a workaround...

  - type: dropdown
    id: breaking
    attributes:
      label: Is this a Breaking Change?
      description: Would it break the existing API?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true

  - type: dropdown
    id: willing
    attributes:
      label: Would you be willing to implement it?
      options:
        - "Yes"
        - "I would need guidance"
        - "No"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
      placeholder: This feature would be useful because...
