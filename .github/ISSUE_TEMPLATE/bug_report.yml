name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please complete the information to help us fix it.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the problem
      placeholder: When I try to...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Code to Reproduce
      description: Minimal code that reproduces the problem
      placeholder: |
        ```typescript
        import { makeLayer } from "effect-bun-redis"
        
        const layer = makeLayer({ host: "localhost" })
        // ...
        ```
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected that...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Instead, I got...
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Messages
      description: If there are errors, paste them here
      placeholder: |
        Error: ...
        Stack trace: ...
      render: shell

  - type: input
    id: bun-version
    attributes:
      label: Bun Version
      description: Run `bun --version`
      placeholder: "1.0.20"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: effect-bun-redis Version
      description: Check your package.json
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: effect-version
    attributes:
      label: Effect Version
      description: Check your package.json
      placeholder: "3.19.14"
    validations:
      required: true

  - type: input
    id: redis-version
    attributes:
      label: Redis/Valkey Version
      description: Run `redis-server --version`
      placeholder: "7.2.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (Native)
        - Docker
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
      placeholder: This only happens when...
