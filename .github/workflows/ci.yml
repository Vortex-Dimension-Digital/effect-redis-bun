name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ['1.2.22', 'latest']
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

  typecheck:
    name: Type Check (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ['1.2.22', 'latest']
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type check
        run: bun run check-types

  test:
    name: Test (Bun ${{ matrix.bun-version }}, Effect ${{ matrix.effect.effect-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ['1.2.22', 'latest']
        effect:
          - effect-version: '3.1.2'
            platform-version: '0.52.3'
          - effect-version: 'latest'
            platform-version: 'latest'
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install specific Effect version
        if: matrix.effect.effect-version != 'latest'
        run: bun add effect@${{ matrix.effect.effect-version }} @effect/platform@${{ matrix.effect.platform-version }} --dev

      - name: Run tests
        run: bun test

  build:
    name: Build (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ['1.2.22', 'latest']
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Check build artifacts
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Error: dist/index.js not found"
            exit 1
          fi
          if [ ! -f "dist/index.d.ts" ]; then
            echo "Error: dist/index.d.ts not found"
            exit 1
          fi
          echo "✓ All build artifacts present"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        continue-on-error: true  # Allow failure in act/nektos
        with:
          name: dist
          path: dist/
          retention-days: 7

  integration-redis:
    name: Integration Redis (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ['1.2.22', 'latest']
      fail-fast: false
    services:
      redis:
        image: redis:7.2
        ports:
          - 6379/tcp
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests (Redis)
        env:
          REDIS_URL: redis://localhost:${{ job.services.redis.ports[6379] }}/15
          REDIS_ALLOW_DESTRUCTIVE: "1"
        run: bun run test:integration

  # Ensure all jobs pass
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, integration-redis]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.integration-redis.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "✓ All CI jobs passed successfully"
